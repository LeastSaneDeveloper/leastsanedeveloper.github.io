<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snowflake</title>
    <style>
        body {
            color: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            font-size: 12px;
        }

        /* Centred Container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }

        .switch-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 10px;
        }
        
        /* Dark Mode */
        /* I took this from https://embed-snowflake.torproject.org/embed.css */
        @media (prefers-color-scheme: dark) {
            body {
                /* https://design.firefox.com/photon/visuals/color.html#dark-theme */
                color: white;
                background-color: #38383d;
            }
            input:checked + .slider {
                background-color: #cc80ff;
            }
            input:focus + .slider {
                box-shadow: 0 0 1px #cc80ff;
            }
        }

        /* Screen Anti-sleep Switch */
        /* I took this from https://embed-snowflake.torproject.org/embed.css */

        .switch {
            position: relative;
            display: inline-block;
            width: 30px;
            height: 17px;
            float: right;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 17px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 13px;
            width: 13px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: BlueViolet;
        }

        input:focus + .slider {
            box-shadow: 0 0 1px BlueViolet;
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(13px);
            -ms-transform: translateX(13px);
            transform: translateX(13px);
        }
    </style>
</head>
<body>
    <div class="container">
        <iframe src="https://snowflake.torproject.org/embed.html" width="320" height="240" frameborder="0" scrolling="no"></iframe>
        <div class="switch-container">
            <p id="sas-antisleep">Screen Anti-Sleep</p>
            <label class="switch">
                <input id="enabled" type="checkbox">
                <span class="slider round"></span>
            </label>
        </div>
    </div>
    <script>
        if ('wakeLock' in navigator) {
            // It's supported
        } else {
            // TODO: Change sas-antisleep text to tell the user this feature isn't supported
            console.error('Wake Lock request failed: Feature is not supported');
        }

        let wakeLock = null;

        document.getElementById('enabled').addEventListener('change', async function() {
            if (this.checked) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    // TODO: Instead of a console error, change sas-antisleep text to tell the user this feature isn't supported
                    console.error(`Wake Lock request failed: ${err.name}, ${err.message}`);
                }
            } else {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                } else {
                    // TODO: Instead of a console error, change sas-antisleep text to tell the user something went wrong
                }
            }
        });
    </script>
</body>
</html>
