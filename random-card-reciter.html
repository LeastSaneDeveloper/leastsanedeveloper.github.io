<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Card Reciter</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #111;
                color: white;
                text-align: center;
                padding-top: 60px;
            }

            #card {
                font-size: 3rem;
                margin: 40px;
            }

            button {
                font-size: 1.2rem;
                padding: 12px 24px;
                margin: 10px;
                cursor: pointer;
            }

            input[type="number"] {
                font-size: 1.2rem;
                padding: 12px;
                margin: 10px;
                width: 100px;
                text-align: center;
                border: none;
                border-radius: 6px;
                background: #222;
                color: white;
                outline: none;
            }
            
            input[type="number"]:focus {
                box-shadow: 0 0 6px #4da3ff;
            }
            
            input[type="number"]::placeholder {
                color: #aaa;
            }

            .hidden {
                visibility: hidden;
            }
        </style>
    </head>
    <body>
        <h1>Random Card Reciter</h1>
        <div id="card">Press Start</div>
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="toggleCard">Hide Card</button>
        <button id="rearrange">Rearrange Cards Timer</button>
        <input id="timerMinutes" type="number" min="1" value="10" placeholder="Minutes">
        <button id="practiceTimer">Practice Timer</button>
        <script>
            const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Jack", "Queen", "King"];
            const suits = ["Spades", "Hearts", "Diamonds","Clubs"];
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            let running = false;
            let paused = false;
            let cardHidden = false;
            let timerRunning = false;
            let practiceTimerRunning = false;
            let wakeLock = null;

            const card = document.getElementById("card");
            const startBtn = document.getElementById("start");
            const pauseBtn = document.getElementById("pause");
            const toggleCardBtn = document.getElementById("toggleCard");
            const rearrangeBtn = document.getElementById("rearrange");
            const timerInput = document.getElementById("timerMinutes");
            const practiceTimerBtn = document.getElementById("practiceTimer");

            async function requestWakeLock() {
                if (!("wakeLock" in navigator)) return;
                wakeLock = await navigator.wakeLock.request("screen");
                wakeLock.addEventListener("release", () => {
                    wakeLock = null;
                });
            }
            
            async function releaseWakeLock() {
                if (wakeLock) {
                    await wakeLock.release();
                    wakeLock = null;
                }
            }

            function randomChoice(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function speak(text) {
                return new Promise(resolve => {
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.rate = 1;
                    utter.pitch = 1;
                    utter.volume = 1;
                    utter.onend = resolve;
                    utter.onerror = resolve;
                    speechSynthesis.speak(utter);
                });
            }

            async function waitWhilePaused() {
                while (paused) {
                    await sleep(100);
                }
            }

            async function loop() {
                while (running) {
                    await waitWhilePaused();
                    if (timerRunning) {
                        await sleep(100);
                        continue;
                    }
                    await sleep(4000);
                    //TODO: Make logic for checking for interruptions better
                    const rank = randomChoice(ranks);
                    const suit = randomChoice(suits);
                    card.textContent = `${rank} of ${suit}`;
                    if (timerRunning) continue;
                    await speak(rank);
                    await sleep(300); 
                    if (timerRunning) continue;
                    await waitWhilePaused();
                    await speak("of");
                    await sleep(300);
                    if (timerRunning) continue;
                    await waitWhilePaused();
                    await speak(suit);
                    pauseBtn.click();
                }
            }

            startBtn.onclick = async function () {
                if (!running) {
                    running = true;
                    paused = false;
                    pauseBtn.textContent = "Pause";
                    startBtn.textContent = "Reset";
                    await requestWakeLock();
                    speechSynthesis.cancel();
                    for (let i = 0; i < 6 && running; i++) {
                        card.textContent = `Joker (${i + 1})`;
                        await speak("Joe");
                        await sleep(300);
                        await speak("Ker");
                        await sleep(2000);
                    }
                    if (running) loop();
                } else {
                    running = false;
                    paused = false;
                    timerRunning = false;
                    practiceTimerRunning = false;
                    speechSynthesis.cancel();
                    await releaseWakeLock();
                    card.textContent = "Press Start";
                    pauseBtn.textContent = "Pause";
                    startBtn.textContent = "Start";
                }
            };

            pauseBtn.onclick = () => {
                if (!running) return;
                paused = !paused;
                if (paused) {
                    speechSynthesis.pause();
                    pauseBtn.textContent = "Resume";
                } else {
                    speechSynthesis.resume();
                    pauseBtn.textContent = "Pause";
                }
            };

            toggleCardBtn.onclick = () => {
                cardHidden = !cardHidden;
                card.classList.toggle("hidden", cardHidden);
                toggleCardBtn.textContent = cardHidden ? "Show Card" : "Hide Card";
            };

            rearrangeBtn.onclick = async () => {
                if (!running || timerRunning) return;
                timerRunning = true;
                speechSynthesis.cancel();
                for (let i = 1; i <= 10; i++) {
                    card.textContent = `${i}`;
                    await speak(i.toString());
                    await sleep(1000);
                }
                card.textContent = "Time's up!";
                await speak("Time's up");
                timerRunning = false;
            };

            practiceTimerBtn.onclick = async () => {
                if (!running || practiceTimerRunning) return;
                let minutes = parseInt(timerInput.value);
                if (isNaN(minutes) || minutes <= 0) return;
                practiceTimerRunning = true;
                while (running && practiceTimerRunning && minutes > 0) {
                    card.textContent = `${minutes} minute(s) remaining`;
                    await speak(
                        minutes <= 2
                            ? `${minutes} minute${minutes === 1 ? "" : "s"} remaining. You may start practicing striking cards.`
                            : `${minutes} minute${minutes === 1 ? "" : "s"} remaining`
                    );
                    if (minutes === 1)
                        break;
                    for (let i = 0; i < 60; i++) {
                        if (!running || !practiceTimerRunning)
                            break;
                        await sleep(1000);
                    }
                    if (!running || !practiceTimerRunning)
                        break;
                    minutes--;
                }
                if (running && practiceTimerRunning) {
                    for (let i = 0; i < 60; i++) {
                        if (!running || !practiceTimerRunning)
                            break;
                        await sleep(1000);
                    }
                    if (running && practiceTimerRunning) {
                        card.textContent = "Time's up!";
                        await speak("Time's up");
                    }
                }
                practiceTimerRunning = false;
            };
        </script>
    </body>
</html>
