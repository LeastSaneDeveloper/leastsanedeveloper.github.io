<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Random Card Reciter</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #111;
                color: white;
                text-align: center;
                padding-top: 60px;
            }

            #card {
                font-size: 3rem;
                margin: 40px;
            }

            button {
                font-size: 1.2rem;
                padding: 12px 24px;
                margin: 10px;
                cursor: pointer;
            }

            .hidden {
                visibility: hidden;
            }
        </style>
    </head>
    <body>
        <h1>Random Card Reciter</h1>
        <div id="card">Press Start</div>
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="toggleCard">Hide Card</button>
        <script>
            const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Jack", "Queen", "King"];
            const suits = ["Spades", "Hearts", "Diamonds","Clubs"];
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            let running = false;
            let paused = false;
            let cardHidden = false;

            const card = document.getElementById("card");
            const startBtn = document.getElementById("start");
            const pauseBtn = document.getElementById("pause");
            const toggleCardBtn = document.getElementById("toggleCard");

            function randomChoice(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function speak(text) {
                return new Promise(resolve => {
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.rate = 1;
                    utter.pitch = 1;
                    utter.volume = 1;
                    utter.onend = resolve;
                    speechSynthesis.speak(utter);
                });
            }

            async function waitWhilePaused() {
                while (paused) {
                    await sleep(100);
                }
            }

            async function loop() {
                while (running) {
                    await waitWhilePaused();
                    const rank = randomChoice(ranks);
                    const suit = randomChoice(suits);
                    card.textContent = `${rank} of ${suit}`;
                    await sleep(2000);
                    await speak(rank);
                    await sleep(250);
                    await waitWhilePaused();
                    await speak("of");
                    await sleep(250);
                    await waitWhilePaused();
                    await speak(suit);
                }
            }

            startBtn.onclick = () => {
                if (running) return;
                running = true;
                paused = false;
                pauseBtn.textContent = "Pause";
                speechSynthesis.cancel();
                loop();
            };

            pauseBtn.onclick = () => {
                if (!running) return;
                paused = !paused;
                if (paused) {
                    speechSynthesis.pause();
                    pauseBtn.textContent = "Resume";
                } else {
                    speechSynthesis.resume();
                    pauseBtn.textContent = "Pause";
                }
            };

            toggleCardBtn.onclick = () => {
                cardHidden = !cardHidden;
                card.classList.toggle("hidden", cardHidden);
                toggleCardBtn.textContent = cardHidden ? "Show Card" : "Hide Card";
            };
        </script>
    </body>
</html>
