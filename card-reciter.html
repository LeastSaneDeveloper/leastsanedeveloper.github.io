<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Card Reciter</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #111;
                color: white;
                text-align: center;
                padding-top: 60px;
            }

            #card {
                font-size: 3rem;
                margin: 40px;
            }

            button {
                font-size: 1.2rem;
                padding: 12px 24px;
                margin: 10px;
                cursor: pointer;
            }

            input[type="number"] {
                font-size: 1.2rem;
                padding: 12px;
                margin: 10px;
                width: 100px;
                text-align: center;
                border: none;
                border-radius: 6px;
                background: #222;
                color: white;
                outline: none;
            }
            
            input[type="number"]:focus {
                box-shadow: 0 0 6px #4da3ff;
            }
            
            input[type="number"]::placeholder {
                color: #aaa;
            }

            #config {
                display: flex;
                flex-direction: column;
                gap: 12px;
                width: fit-content;
                margin: 30px auto;
            }
            
            #config > div {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
            }
            
            #config label {
                min-width: 240px;
                text-align: left;
            }

            .hidden {
                visibility: hidden;
            }
        </style>
    </head>
    <body>
        <h1>Card Reciter</h1>
        <div id="card">Press Start</div>
        <br>
        <div id="config">
            <div>
                <label for="memorizationMinutes">Memorization Time (Minutes):</label>
                <input id="memorizationMinutes" type="number" min="1" value="10" placeholder="Minutes">
            </div>
            <div>
                <label for="totalAmountOfCards">Both Players Total Cards:</label>
                <input id="totalAmountOfCards" type="number" min="2" value="50" placeholder="Total Card Amount">
            </div>
        </div>
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="toggleCard">Hide Card</button>
        <hr>
        <div style="margin-top:20px;">
            <h2>Player 1</h2>
            <div>
                Score:
                <span id="score1">0</span> /
                <span id="cardsLeft1">52</span>
            </div>
            <button id="scoreBtn1">+1</button>
            <button id="rearrange1">Player 1 Rearrange (0/5)</button>
        </div>
        <div style="margin-top:20px;">
            <h2>Player 2</h2>
            <div>
                Score:
                <span id="score2">0</span> /
                <span id="cardsLeft2">52</span>
            </div>
            <button id="scoreBtn2">+1</button>
            <button id="rearrange2">Player 2 Rearrange (0/5)</button>
        </div>
        <script>
            const ranks = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Jack", "Queen", "King"];
            const suits = ["Spades", "Hearts", "Diamonds", "Clubs"];
            const card = document.getElementById("card");
            const startBtn = document.getElementById("start");
            const pauseBtn = document.getElementById("pause");
            const toggleCardBtn = document.getElementById("toggleCard");
            const memorizationMinutesInput = document.getElementById("memorizationMinutes");
            const totalCardsInput = document.getElementById("totalAmountOfCards");
            const config = document.getElementById("config");
            const rearrangeBtn1 = document.getElementById("rearrange1");
            const rearrangeBtn2 = document.getElementById("rearrange2");
            const scoreBtn1 = document.getElementById("scoreBtn1");
            const scoreBtn2 = document.getElementById("scoreBtn2");
            const score1 = document.getElementById("score1");
            const score2 = document.getElementById("score2");
            const cardsLeft1 = document.getElementById("cardsLeft1");
            const cardsLeft2 = document.getElementById("cardsLeft2");
            let player1 = {
                score: 0,
                rearranges: 0
            };
            let player2 = {
                score: 0,
                rearranges: 0
            };
            let state = {
                mode: "idle",
                runId: 0,
                hidden: false,
                wakeLock: null
            };
            
            function randomChoice(arr) {
                return arr[Math.floor(Math.random() * arr.length)];
            }

            function updateScoreboard() {
                const total = Number(totalCardsInput.value) || 0;
                score1.textContent = player1.score;
                score2.textContent = player2.score;
                cardsLeft1.textContent = Math.max(total - player1.score, 0);
                cardsLeft2.textContent = Math.max(total - player2.score, 0);
                rearrangeBtn1.textContent = `Player 1 Rearrange (${player1.rearranges}/5)`;
                rearrangeBtn2.textContent = `Player 2 Rearrange (${player2.rearranges}/5)`;
                rearrangeBtn1.disabled = state.mode !== "paused" || player1.rearranges >= 5;
                rearrangeBtn2.disabled = state.mode !== "paused" || player2.rearranges >= 5;
            }
            
            function updateButtons() {
                startBtn.textContent = state.mode === "idle" ? "Start" : "Reset";
                pauseBtn.textContent = state.mode === "paused" ? "Resume" : "Pause";
                rearrangeBtn1.disabled = state.mode !== "paused";
                rearrangeBtn2.disabled = state.mode !== "paused";
                updateScoreboard();
            }
            
            async function requestWakeLock() {
                if (!("wakeLock" in navigator) || state.wakeLock) return;
                try {
                    state.wakeLock = await navigator.wakeLock.request("screen");
                    state.wakeLock.addEventListener("release", () => { state.wakeLock = null });
                } catch {}
            }
            
            async function releaseWakeLock() {
                if (!state.wakeLock) return;
                try {
                    await state.wakeLock.release();
                } catch {}
                state.wakeLock = null;
            }
            
            async function waitForVoices() {
                if (speechSynthesis.getVoices().length) return;
                await new Promise(resolve => { speechSynthesis.onvoiceschanged = () => resolve() });
            }
            
            function unlockSpeech() {
                speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance("");
                utter.volume = 0;
                speechSynthesis.speak(utter);
            }
            
            async function sleep(ms, id) {
                const end = performance.now() + ms;
                while (performance.now() < end) {
                    if (id !== state.runId) return false;
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                return true;
            }
            
            async function speak(text, id) {
                if (id !== state.runId) return false;
                speechSynthesis.cancel();
                return new Promise(resolve => {
                    const utter = new SpeechSynthesisUtterance(text);
                    utter.rate = 1;
                    utter.pitch = 1;
                    utter.volume = 1;
                    utter.onend = () => resolve(id === state.runId);
                    utter.onerror = () => resolve(false);
                    speechSynthesis.speak(utter);
                });
            }
            
            async function waitUntilResumed(id) {
                while (state.mode === "paused") {
                    if (id !== state.runId) return false;
                    await new Promise(resolve => setTimeout(resolve, 50));
                }
                return id === state.runId;
            }
            
            async function stop() {
                state.runId++;
                state.mode = "idle";
                speechSynthesis.cancel();
                await releaseWakeLock();
                card.textContent = "Press Start";
                updateButtons();
                player1.score = 0;
                player2.score = 0;
                player1.rearranges = 0;
                player2.rearranges = 0;
                updateScoreboard();
            }
            
            updateButtons();

            async function memorizationTimer(minutes, id) {
                state.mode = "memorizing";
                updateButtons();
                while (minutes > 0) {
                    if (id !== state.runId) return false;
                    card.textContent = `${minutes} minute${minutes === 1 ? "" : "s"} remaining`;
                    if (!await speak(
                        minutes <= 2
                            ? `${minutes} minute${minutes === 1 ? "" : "s"} remaining. You may start practicing striking cards.`
                            : `${minutes} minute${minutes === 1 ? "" : "s"} remaining`,
                        id
                    )) return false;
                    if (minutes === 1) break;
                    if (!await sleep(60000, id)) return false;
                    minutes--;
                }
                if (!await sleep(60000, id)) return false;
                card.textContent = "Time's up!";
                return speak("Time's up", id);
            }
            
            async function jokerSequence(id) {
                state.mode = "joker";
                updateButtons();
                for (let i = 1; i <= 6; i++) {
                    if (id !== state.runId) return false;
                    card.textContent = `Joker (${i})`;
                    if (!await speak("Joe", id)) return false;
                    if (!await sleep(300, id)) return false;
                    if (!await speak("Ker", id)) return false;
                    if (!await sleep(2000, id)) return false;
                }
                return true;
            }
            
            async function announceCard(rank, suit, id) {
                card.textContent = `${rank} of ${suit}`;
                if (!await speak(rank, id)) return false;
                if (!await sleep(300, id)) return false;
                if (!await speak("of", id)) return false;
                if (!await sleep(300, id)) return false;
                return speak(suit, id);
            }
            
            async function cardLoop(id) {
                state.mode = "cards";
                updateButtons();
                while (id === state.runId) {
                    if (!await waitUntilResumed(id)) return;
                    if (!await sleep(5000, id)) return;
                    if (!await waitUntilResumed(id)) return;
                    const rank = randomChoice(ranks);
                    const suit = randomChoice(suits);
                    if (!await announceCard(rank, suit, id)) return;
                    state.mode = "paused";
                    updateButtons();
                }
            }
            
            async function rearrangeTimer(id) {
                updateButtons();
                for (let i = 1; i <= 10; i++) {
                    if (id !== state.runId) return false;
                    card.textContent = `${i}`;
                    if (!await speak(i.toString(), id)) return false;
                    if (!await sleep(1000, id)) return false;
                }       
                card.textContent = "Time's up!";    
                if (!await speak("Time's up", id)) return false;
                updateButtons();
                return true;
            }

            async function useRearrange(player) {
                if (state.mode !== "paused") return;
                if (player.rearranges >= 5) return;
                player.rearranges++;
                updateScoreboard();
                await rearrangeTimer(state.runId);
            }
        
            async function start() {
                const id = ++state.runId;
                state.mode = "memorizing";
                updateButtons();
                unlockSpeech();
                await waitForVoices();
                await requestWakeLock();
                if (!await speak("Started", id)) return;
                if (!await sleep(2000, id)) return;
                const minutes = Number(memorizationMinutesInput.value);
                if (minutes > 0) {
                    if (!await memorizationTimer(minutes, id)) return;
                }
                if (!await jokerSequence(id)) return;
                await cardLoop(id);
                if (id === state.runId) await stop();
            }
            
            startBtn.onclick = async () => {
                if (state.mode === "idle") {
                    await start();
                } else {
                    await stop();
                }
            };
            
            pauseBtn.onclick = () => {
                if (state.mode === "idle" || state.mode === "memorizing" || state.mode === "joker") return;
                if (state.mode === "paused") {
                    state.mode = "cards";
                    speechSynthesis.resume();
                } else {
                    state.mode = "paused";
                    speechSynthesis.pause();
                }
                updateButtons();
            };
            
            toggleCardBtn.onclick = () => {
                state.hidden = !state.hidden;
                card.classList.toggle("hidden", state.hidden);
                toggleCardBtn.textContent = state.hidden ? "Show Card" : "Hide Card";
            };
            
            document.addEventListener("visibilitychange", async () => {
                if (document.visibilityState !== "visible") return;
                if (state.mode !== "idle") await requestWakeLock();
            });

            scoreBtn1.onclick = () => {
                player1.score++;
                updateScoreboard();
            };
            
            scoreBtn2.onclick = () => {
                player2.score++;
                updateScoreboard();
            };
            
            totalCardsInput.oninput = updateScoreboard;
            rearrangeBtn1.onclick = () => useRearrange(player1);
            rearrangeBtn2.onclick = () => useRearrange(player2);
        </script>
    </body>
</html>
